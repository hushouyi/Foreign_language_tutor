<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alice - AI 语言助教</title>
<style>
/* ── 全局重置 ───────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; background: #f5f5f5; color: #333; }

/* ── 页面容器 ──────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; max-width: 100%; }

/* ── Header ────────────────────────────────── */
#header {
  flex-shrink: 0; height: 56px; line-height: 56px;
  background: #07c160; color: #fff; text-align: center;
  font-size: 17px; font-weight: 600; letter-spacing: 0.5px;
  box-shadow: 0 1px 2px rgba(0,0,0,.1); position: relative; z-index: 10;
}

/* ── 消息区 ────────────────────────────────── */
#messages {
  flex: 1; overflow-y: auto; padding: 16px 12px 8px;
  background: #f5f5f5;
  scroll-behavior: smooth;
}

.message { margin-bottom: 14px; display: flex; align-items: flex-start; gap: 8px; }
.message.user { flex-direction: row-reverse; }

/* 头像 */
.avatar {
  flex-shrink: 0; width: 40px; height: 40px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff; user-select: none;
}
.avatar.ai { background: #07c160; }
.avatar.user { background: #b0b0b0; }

/* 气泡 */
.bubble {
  max-width: 75%; padding: 10px 14px; border-radius: 10px;
  font-size: 15px; line-height: 1.6; word-break: break-word;
  position: relative; box-shadow: 0 1px 1px rgba(0,0,0,.05);
}
.message.ai .bubble {
  background: #fff; color: #333;
  border-top-left-radius: 2px;
}
.message.user .bubble {
  background: #95ec69; color: #000;
  border-top-right-radius: 2px;
}
/* 气泡尾巴 */
.message.ai .bubble::before {
  content: ''; position: absolute; left: -7px; top: 10px;
  border: 5px solid transparent; border-right-color: #fff;
}
.message.user .bubble::before {
  content: ''; position: absolute; right: -7px; top: 10px;
  border: 5px solid transparent; border-left-color: #95ec69;
}

/* 气泡内文字 */
.bubble .text { white-space: pre-wrap; }
.bubble .translation {
  margin-top: 4px; padding-top: 6px; border-top: 1px dashed #e0e0e0;
  font-size: 13px; color: #999;
}

/* 音频按钮 */
.audio-btn {
  flex-shrink: 0; width: 32px; height: 32px; margin-top: 4px;
  border: none; border-radius: 50%; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  background: transparent; color: #07c160; transition: background .15s;
  opacity: 0.6;
}
.audio-btn:hover { background: rgba(7,193,96,.1); }
.audio-btn.playing { opacity: 1; color: #e65c5c; }
.audio-btn.hidden { visibility: hidden; }

/* ── 系统消息 ──────────────────────────────── */
.message.system { justify-content: center; }
.message.system .bubble {
  background: transparent; color: #999; font-size: 12px; text-align: center;
  max-width: 90%; box-shadow: none;
}
.message.system .bubble::before { display: none; }
.message.system .avatar { display: none; }

/* ── 状态栏 ────────────────────────────────── */
#status-bar {
  flex-shrink: 0; height: 28px; line-height: 28px;
  text-align: center; font-size: 13px; color: #999;
  background: #f5f5f5; border-top: 1px solid #eee;
  transition: opacity .2s;
}
#status-bar.hidden { opacity: 0; height: 0; overflow: hidden; }

/* thinking 动画 */
.thinking-dots::after {
  content: ''; display: inline-block;
  animation: dotPulse 1.4s infinite steps(1);
}
@keyframes dotPulse {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
  100% { content: ''; }
}

/* ── 输入区 ────────────────────────────────── */
#input-area {
  flex-shrink: 0; padding: 8px 12px;
  background: #f5f5f5; border-top: 1px solid #ddd;
}
#input-row {
  display: flex; align-items: center; gap: 8px;
  background: #fff; border-radius: 8px; padding: 2px 4px;
  border: 1px solid #ddd;
}
#input-row:focus-within { border-color: #07c160; }

#input-text {
  flex: 1; border: none; outline: none; padding: 8px 10px;
  font-size: 16px; font-family: inherit; background: transparent;
  resize: none; height: 36px; line-height: 22px;
}

#send-btn {
  flex-shrink: 0; height: 36px; padding: 0 18px; border: none; border-radius: 6px;
  background: #07c160; color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: background .15s, opacity .15s;
}
#send-btn:hover { background: #06ad56; }
#send-btn:disabled { background: #ccc; cursor: not-allowed; }

/* ── 麦克风按钮 ────────────────────────────── */
#mic-btn {
  flex-shrink: 0; width: 36px; height: 36px;
  border: none; border-radius: 50%; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  background: transparent; transition: all .2s; outline: none;
}
#mic-btn:hover:not(.mic-disabled) { background: rgba(7,193,96,.1); }

.mic-idle { color: #999; }
.mic-listening {
  color: #07c160; background: rgba(7,193,96,.08);
  animation: micPulse 1.5s ease-in-out infinite;
}
.mic-processing {
  color: #999;
  animation: micSpin 0.8s linear infinite;
}
.mic-disabled { opacity: 0.3; cursor: not-allowed; }

@keyframes micPulse {
  0% { box-shadow: 0 0 0 0 rgba(7,193,96,.4); }
  70% { box-shadow: 0 0 0 12px rgba(7,193,96,0); }
  100% { box-shadow: 0 0 0 0 rgba(7,193,96,0); }
}
@keyframes micSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ── 警告横幅 ──────────────────────────────── */
#warning-toast {
  position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
  background: #fff3cd; color: #856404; padding: 6px 18px; border-radius: 6px;
  font-size: 13px; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.15);
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
#warning-toast.show { opacity: 1; }

/* ── 滚动条 ────────────────────────────────── */
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
</style>
</head>
<body>

<div id="app">
  <div id="header">Alice - AI 语言助教 [English]</div>

  <div id="messages"></div>

  <div id="status-bar" class="hidden"></div>

  <div id="input-area">
    <div id="input-row">
      <button id="mic-btn" class="mic mic-idle" title="语音输入">🎤</button>
      <input type="text" id="input-text" placeholder="输入消息..." autofocus>
      <button id="send-btn" disabled>发送</button>
    </div>
  </div>
</div>

<div id="warning-toast"></div>

<script>
// ── 状态 ─────────────────────────────────────
const state = {
  langKey: 'english',
  langDisplay: 'English',
  characterName: 'Alice',
  isProcessing: false,
  welcomeAudioUrls: [],   // 欢迎词音频 URL 列表
  welcomePlayed: false,   // 欢迎词是否已播放过
};

// ── DOM 引用 ────────────────────────────────
const messagesEl = document.getElementById('messages');
const statusBar = document.getElementById('status-bar');
const inputText = document.getElementById('input-text');
const sendBtn = document.getElementById('send-btn');
const header = document.getElementById('header');
const warningToast = document.getElementById('warning-toast');
const micBtn = document.getElementById('mic-btn');
// ── 工具 ────────────────────────────────────
function scrollBottom() {
  requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function setStatus(text, cls = '') {
  statusBar.textContent = text;
  statusBar.className = cls;
  if (text) statusBar.classList.remove('hidden');
  else statusBar.classList.add('hidden');
}

function showWarning(msg) {
  warningToast.textContent = msg;
  warningToast.classList.add('show');
  setTimeout(() => warningToast.classList.remove('show'), 4000);
}

// ── 消息渲染 ────────────────────────────────
function addMessage(type, content, translation, audioUrl) {
  const div = document.createElement('div');
  div.className = `message ${type}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${type}`;
  avatar.textContent = type === 'ai' ? state.characterName.charAt(0) : '我';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // 内容不可编辑
  const textSpan = document.createElement('div');
  textSpan.className = 'text';
  textSpan.textContent = content;

  bubble.appendChild(textSpan);

  if (translation) {
    const transSpan = document.createElement('div');
    transSpan.className = 'translation';
    transSpan.textContent = translation;
    bubble.appendChild(transSpan);
  }

  const audioBtn = document.createElement('button');
  audioBtn.className = 'audio-btn hidden';
  audioBtn.innerHTML = '&#x1F50A;';

  if (type === 'ai') {
    div.appendChild(avatar);
    div.appendChild(bubble);
    div.appendChild(audioBtn);
  } else {
    div.appendChild(audioBtn);
    div.appendChild(bubble);
    div.appendChild(avatar);
  }

  messagesEl.appendChild(div);
  scrollBottom();

  // 关联音频（欢迎词：只显示按钮，不自动播放）
  if (type === 'ai' && audioUrl) {
    audioBtn.className = 'audio-btn';
    audioBtn.dataset.url = audioUrl;
    audioBtn.onclick = () => playSingleAudio(audioUrl, audioBtn);
  }

  return div;
}

function addSystemMessage(text) {
  const div = document.createElement('div');
  div.className = 'message system';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollBottom();
}

function clearMessages() {
  messagesEl.innerHTML = '';
}

function updateHeader() {
  header.textContent = `${state.characterName} - AI 语言助教 [${state.langDisplay}]`;
}

// ── Web Audio API + 顺序播放队列 ─────────────
let audioCtx = null;
const audioQueue = [];
let audioPlaying = false;
let audioQueueTotal = 0;
let audioQueuePlayed = 0;

/** 在用户手势中创建/解锁 AudioContext */
async function unlockAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    try { await audioCtx.resume(); } catch (e) {}
  }
  // 播一段 50ms 静音，让浏览器确认"该页面已获得音频权限"
  const dummy = audioCtx.createBuffer(1, Math.ceil(audioCtx.sampleRate * 0.05), audioCtx.sampleRate);
  const src = audioCtx.createBufferSource();
  src.buffer = dummy;
  src.connect(audioCtx.destination);
  src.start(0);
}

/** 将音频加入队列顺序播放 */
function queueAudio(url, btn) {
  if (!url) return;
  audioQueue.push({ url, btn });
  audioQueueTotal++;
  if (!audioPlaying) {
    setStatus(`${state.characterName} 朗读中... [1/${audioQueueTotal}]`);
    playNextAudio();
  } else {
    setStatus(`${state.characterName} 朗读中... [${audioQueuePlayed + 1}/${audioQueueTotal}]`);
  }
}

function playNextAudio() {
  if (audioQueue.length === 0) {
    audioPlaying = false;
    setStatus('');
    return;
  }
  audioPlaying = true;
  const { url, btn } = audioQueue.shift();
  audioQueuePlayed++;

  const remaining = audioQueue.length;
  if (remaining > 0) {
    setStatus(`${state.characterName} 朗读中... [${audioQueuePlayed + 1}/${audioQueueTotal}]`);
  }

  document.querySelectorAll('.audio-btn.playing').forEach(b => b.classList.remove('playing'));
  if (btn) btn.classList.add('playing');

  // 用 AudioContext 解码并播放
  fetch(url)
    .then(r => r.arrayBuffer())
    .then(buf => audioCtx.decodeAudioData(buf))
    .then(audioBuf => {
      const src = audioCtx.createBufferSource();
      src.buffer = audioBuf;
      src.connect(audioCtx.destination);
      src.start(0);
      src.onended = () => {
        if (btn) btn.classList.remove('playing');
        playNextAudio();
      };
    })
    .catch(() => {
      if (btn) btn.classList.remove('playing');
      playNextAudio();
    });
}

function resetAudioQueue() {
  audioQueue.length = 0;
  audioPlaying = false;
  audioQueueTotal = 0;
  audioQueuePlayed = 0;
}

/** 用户手势中点击按钮重播 */
async function playSingleAudio(url, btn) {
  if (!url) return;
  await unlockAudio();  // 点击按钮就是用户手势
  audioQueue.length = 0;
  audioPlaying = false;

  document.querySelectorAll('.audio-btn.playing').forEach(b => b.classList.remove('playing'));
  if (btn) btn.classList.add('playing');

  try {
    const resp = await fetch(url);
    const buf = await resp.arrayBuffer();
    const audioBuf = await audioCtx.decodeAudioData(buf);
    const src = audioCtx.createBufferSource();
    src.buffer = audioBuf;
    src.connect(audioCtx.destination);
    src.start(0);
    src.onended = () => { if (btn) btn.classList.remove('playing'); };
  } catch (e) {
    if (btn) btn.classList.remove('playing');
  }
}

// ── NDJSON 流解析 ──────────────────────────
const pendingSegments = [];  // 待逐段揭示的 AI 回复段
let revealGeneration = 0;   // 递增，用于取消旧链的后续揭示
let revealTotal = 0;        // 当前回复总段数（用于状态显示）
let revealIndex = 0;        // 当前正在播放的段序号

async function chatStream(userText) {
  if (state.isProcessing) return;
  state.isProcessing = true;
  sendBtn.disabled = true;
  inputText.disabled = true;
  micBtn.classList.add("mic-disabled");

  // 清空上一轮未 reveal 完的段，取消旧 reveal 链
  pendingSegments.length = 0;
  revealGeneration++;
  revealTotal = 0;
  revealIndex = 0;

  // 显示用户消息
  addMessage('user', userText, null, null);

  // 发送请求
  let response;
  try {
    response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userText }),
    });
    if (!response.ok) {
      const errText = await response.text();
      addSystemMessage('❌ 请求失败: ' + errText);
      state.isProcessing = false;
      sendBtn.disabled = false;
      inputText.disabled = false;
      micBtn.classList.remove("mic-disabled");
      inputText.focus();
      return;
    }
  } catch (e) {
    addSystemMessage('❌ 网络错误: ' + e.message);
    state.isProcessing = false;
    sendBtn.disabled = false;
    inputText.disabled = false;
    inputText.focus();
    return;
  }

  // 读取 NDJSON 流
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) {
        // 处理剩余 buffer
        if (buffer.trim()) processLine(buffer.trim());
        break;
      }
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();  // 保留未完成行

      for (const line of lines) {
        if (!line.trim()) continue;
        processLine(line.trim());
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      addSystemMessage('❌ 读取流错误: ' + e.message);
    }
  } finally {
    reader.releaseLock();
    state.isProcessing = false;
    sendBtn.disabled = false;
    inputText.disabled = false;
    inputText.focus();
  }

  function processLine(line) {
    let evt;
    try { evt = JSON.parse(line); } catch (e) { return; }

    switch (evt.type) {
      case 'status':
        if (evt.status === 'thinking') {
          setStatus(`${state.characterName} 思考中···`, 'thinking-dots');
        } else if (evt.status === 'goodbye') {
          setStatus('');
          addSystemMessage('👋 会话已结束，输入新消息继续对话');
        }
        break;

      case 'segment':
        // 缓冲，不立即显示
        pendingSegments.push({
          content: evt.content,
          translation: evt.translation || null,
          audioUrl: null,
        });
        break;

      case 'audio':
        // 把音频 URL 挂到最后一个缓冲段上
        if (evt.url && pendingSegments.length > 0) {
          pendingSegments[pendingSegments.length - 1].audioUrl = evt.url;
        }
        break;

      case 'lang_switch':
        state.langKey = evt.lang_key;
        state.langDisplay = evt.display;
        updateHeader();
        addSystemMessage(`🌐 已切换到 ${evt.display}`);
        break;

      case 'warning':
        showWarning(evt.message);
        break;

      case 'error':
        addSystemMessage('❌ ' + (evt.message || '未知错误'));
        break;

      case 'cleared':
        pendingSegments.length = 0;
        clearMessages();
        addSystemMessage('🗑️ 对话已清空');
        break;

      case 'done':
        setStatus('');
        // 记录总段数，开始逐段揭示
        revealTotal = pendingSegments.length;
        revealIndex = 0;
        revealNextResponseSegment();
        break;
    }
  }
}

/** 逐段揭示 AI 回复：显示一段 → 播音频 → 完成后显示下一段 */
async function revealNextResponseSegment() {
  const myGen = revealGeneration;
  if (pendingSegments.length === 0) { setStatus(''); return; }
  const seg = pendingSegments.shift();
  const msgEl = addMessage('ai', seg.content, seg.translation, null);

  revealIndex++;
  setStatus(`${state.characterName} 朗读中... [${revealIndex}/${revealTotal}]`);

  if (!seg.audioUrl || myGen !== revealGeneration) { revealNextResponseSegment(); return; }

  const btn = msgEl.querySelector('.audio-btn');
  if (!btn || myGen !== revealGeneration) { revealNextResponseSegment(); return; }

  btn.className = 'audio-btn';
  btn.dataset.url = seg.audioUrl;
  btn.onclick = () => playSingleAudio(seg.audioUrl, btn);

  try {
    const resp = await fetch(seg.audioUrl);
    const buf = await resp.arrayBuffer();
    const audioBuf = await audioCtx.decodeAudioData(buf);
    const src = audioCtx.createBufferSource();
    src.buffer = audioBuf;
    src.connect(audioCtx.destination);
    src.start(0);
    btn.classList.add('playing');
    await new Promise(r => { src.onended = r; });
    btn.classList.remove('playing');
  } catch (e) {}

  if (myGen !== revealGeneration) return;
  revealNextResponseSegment();
}

// ════════════════════════════════════════════════
// 语音识别 (Web Speech API)
// ════════════════════════════════════════════════

const STT_LANG_MAP = {
  english: "en-US",
  japanese: "ja-JP",
  french: "fr-FR",
  spanish: "es-ES",
  korean: "ko-KR",
  german: "de-DE",
  russian: "ru-RU",
  chinese: "zh-CN",
  italian: "it-IT",
  portuguese: "pt-BR",
  arabic: "ar-SA",
};

/** 当前语音识别状态 */
let recognition = null;
let isListening = false;       // 用户意图：正在聆听
let userStopped = false;       // 用户主动点击停止
let speechDetected = false;    // 是否检测到了人声
let resultReceived = false;   // 是否收到了识别结果
let recogLang = "en-US";

function getSTTLang(langKey) {
  return STT_LANG_MAP[langKey] || "en-US";
}

function toggleMic() {
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
}

// ── 麦克风设备枚举 + 选择 ────────────────────
let selectedMicId = null;  // null = 默认设备

navigator.mediaDevices.enumerateDevices()
  .then(devices => {
    const mics = devices.filter(d => d.kind === "audioinput");
    console.log("[mic] available mics:", mics.map(m => m.label || m.deviceId.slice(0,20)+"..."));
    if (mics.length > 0) {
      setStatus("🎤 " + mics.length + " 个麦克风可用");
      setTimeout(() => setStatus(""), 2000);
    }
  })
  .catch(e => console.log("[mic] enumerate error:", e));

// ── 音频电平表（麦克风可视化） ─────────────────
let micStream = null;
let audioCtxMeter = null;
let meterInterval = null;

function startMeter(stream) {
  micStream = stream;
  try {
    audioCtxMeter = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtxMeter.createMediaStreamSource(stream);
    const analyser = audioCtxMeter.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    meterInterval = setInterval(() => {
      analyser.getByteTimeDomainData(data);
      let max = 0;
      for (let i = 0; i < data.length; i++) {
        const v = Math.abs(data[i] - 128);
        if (v > max) max = v;
      }
      const pct = Math.min(100, (max / 128) * 100);
      if (pct > 3) {
        micBtn.style.boxShadow = "0 0 " + (6 + pct/3) + "px rgba(7,193,96," + (0.3 + pct/150) + ")";
        micBtn.style.background = "rgba(7,193,96," + Math.min(0.3, pct/300) + ")";
      } else {
        micBtn.style.boxShadow = "none";
        micBtn.style.background = "transparent";
      }
    }, 50);
  } catch(e) { console.log("[mic] meter error:", e); }
}

function stopMeter() {
  if (meterInterval) { clearInterval(meterInterval); meterInterval = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtxMeter) { try { audioCtxMeter.close(); } catch(e) {} audioCtxMeter = null; }
  micBtn.style.boxShadow = "none";
  micBtn.style.background = "transparent";
}

// ── 语音识别 ──────────────────────────────────

/** 一段"无结果"超时后弹出提示（防止识别被卡住） */
let stuckTimer = null;

function startListening() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showWarning("浏览器不支持语音识别，请使用 Chrome 或 Edge");
    return;
  }
  if (state.isProcessing) {
    console.log("[mic] start rejected: processing");
    return;
  }

  console.log("[mic] ======== startListening ========");
  console.log("[mic] selectedMicId:", selectedMicId);
  speechDetected = false;
  resultReceived = false;
  recogLang = getSTTLang(state.langKey);
  console.log("[mic] recognition.lang=" + recogLang);

  // 打开麦克风（用于电平表 + 确认设备可用）
  navigator.mediaDevices.getUserMedia({
    audio: selectedMicId ? { deviceId: { exact: selectedMicId } } : true
  })
    .then((stream) => {
      console.log("[mic] getUserMedia OK");
      const track = stream.getAudioTracks()[0];
      console.log("[mic] using device:", track.label);
      console.log("[mic] device settings:", JSON.stringify(track.getSettings ? track.getSettings() : {}));
      setStatus("🎤 " + track.label);
      setTimeout(() => setStatus(""), 2000);
      startMeter(stream);

      // ── 创建 SpeechRecognition ──
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = recogLang;

      // ---- 全部事件处理 ----

      recognition.onaudiostart = () => console.log("[mic] EVENT: audiostart");
      recognition.onaudioend   = () => console.log("[mic] EVENT: audioend");
      recognition.onsoundstart = () => {
        speechDetected = true;
        console.log("[mic] EVENT: soundstart ← 麦克风检测到了声音");
      };
      recognition.onsoundend   = () => console.log("[mic] EVENT: soundend");
      recognition.onspeechstart = () => console.log("[mic] EVENT: speechstart ← 识别到语音");
      recognition.onspeechend  = () => console.log("[mic] EVENT: speechend");

      recognition.onnomatch = (event) => {
        console.log("[mic] EVENT: nomatch — 听到了声音但无法匹配任何文字", event);
      };

      recognition.onresult = (event) => {
        resultReceived = true;
        let finalText = "";
        let interimText = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const t = event.results[i][0].transcript;
          const conf = event.results[i][0].confidence;
          if (event.results[i].isFinal) {
            finalText += t;
            console.log("[mic] FINAL result:", JSON.stringify(t), "confidence:", conf);
          } else {
            interimText += t;
            console.log("[mic] interim result:", JSON.stringify(t));
          }
        }
        inputText.value = finalText + (interimText ? " " + interimText : "");
        inputText.dispatchEvent(new Event("input"));
        console.log("[mic] onresult → inputText.value=", JSON.stringify(inputText.value));
      };

      recognition.onerror = (event) => {
        console.log("[mic] EVENT: onerror —", event.error, event.message || "");
        if (event.error === "not-allowed") {
          showWarning("麦克风权限被拒绝");
          _micCleanup();
        } else if (event.error === "no-speech") {
          showWarning("没有检测到语音");
          _micCleanup();
        } else if (event.error === "aborted") {
          // 用户主动停止，不报错
          console.log("[mic]   (aborted by user)");
        } else {
          showWarning("语音识别错误: " + event.error);
          _micCleanup();
        }
      };

      recognition.onend = () => {
        console.log("[mic] EVENT: onend — isListening=" + isListening + " text='" + inputText.value.trim() + "'");
        // 如果是用户主动停止，onend 的处理交给 stopListening() 的下一步
        // 只有当 isListening 仍然为 true 时（异常断线/自然结束），才尝试重启或清理
        if (isListening) {
          // 自然结束或异常断线
          if (resultReceived) {
            const t = inputText.value.trim();
            if (t) {
              isListening = false;
              _micCleanup();
              sendMessage();
            } else {
              // 有结果但为空，继续监听
              console.log("[mic] onend: restarting (empty result)");
              try { recognition.start(); } catch(e) { _micCleanup(); }
            }
          } else {
            // 从未收到任何结果 — 可能识别服务连接失败
            console.log("[mic] onend: no result ever received, stopping");
            isListening = false;
            _micCleanup();
            if (!speechDetected) {
              showWarning("没有检测到语音，请检查麦克风");
            } else {
              showWarning("语音识别服务无响应，请检查网络或重试");
            }
          }
        }
      };

      try {
        recognition.start();
        isListening = true;
        micBtn.className = "mic mic-listening";
        inputText.placeholder = "说点什么...";
        setStatus("🎤 聆听中");
        console.log("[mic] recognition.start() OK");

        // 安全超时：如果 12 秒内没有任何结果（interim/final），提示用户
        stuckTimer = setTimeout(() => {
          if (isListening && !resultReceived) {
            console.log("[mic] STUCK: 12s without any result");
            if (speechDetected) {
              showWarning("检测到声音但识别无结果，可能是网络问题或麦克风不兼容");
            } else {
              setStatus("🎤 没有检测到声音，请检查麦克风");
            }
          }
        }, 12000);
      } catch (e) {
        console.log("[mic] recognition.start() ERROR:", e);
        showWarning("启动语音识别失败: " + e.message);
        _micCleanup();
      }
    })
    .catch((err) => {
      console.log("[mic] getUserMedia DENIED:", err.message);
      showWarning("麦克风权限被拒绝，请在浏览器地址栏左侧点击🔒设置麦克风权限");
    });
}

function stopListening() {
  console.log("[mic] ======== stopListening ========");
  console.log("[mic] current text='", inputText.value.trim(), "'");
  console.log("[mic] speechDetected=" + speechDetected + " resultReceived=" + resultReceived);
  isListening = false;

  if (stuckTimer) { clearTimeout(stuckTimer); stuckTimer = null; }

  if (recognition) {
    // 先 stop() — 让 recognition 处理完待处理的音频，可能会最终触发 onresult
    try {
      console.log("[mic] calling recognition.stop()");
      recognition.stop();
      console.log("[mic] recognition.stop() returned");
    } catch (e) {
      console.log("[mic] stop() error:", e);
      try { recognition.abort(); } catch (e2) {}
    }
    recognition = null;
  }

  const text = inputText.value.trim();

  if (resultReceived && text) {
    _micCleanup();
    sendMessage();
  } else {
    _micCleanup();
    if (speechDetected && !resultReceived) {
      showWarning("检测到声音但无法识别为文字，请检查网络或尝试 Edge 浏览器");
    } else if (!speechDetected) {
      showWarning("没有检测到语音");
    } else {
      showWarning("语音识别失败");
    }
  }
}

function _micCleanup() {
  if (stuckTimer) { clearTimeout(stuckTimer); stuckTimer = null; }
  stopMeter();
  isListening = false;
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }
  micBtn.className = "mic mic-idle";
  micBtn.style.boxShadow = "none";
  micBtn.style.background = "transparent";
  inputText.placeholder = "输入消息...";
  setStatus("");
  userStopped = false;
}

// ── 初始化 ─────────────────────────────────
async function initApp() {
  try {
    const resp = await fetch('/api/init');
    const data = await resp.json();

    state.langKey = data.current_lang;
    state.langDisplay = data.lang_display;
    state.characterName = data.character_name;
    updateHeader();

    // 渲染欢迎词
    const welcome = data.welcome;
    if (welcome && welcome.segments) {
      if (welcome.audio_urls) {
        state.welcomeAudioUrls = welcome.audio_urls.map(a => a.url).filter(Boolean);
      }
      welcome.segments.forEach((seg, i) => {
        const audioUrl = (welcome.audio_urls && welcome.audio_urls[i]?.url) || null;
        addMessage('ai', seg.content, seg.translation || null, audioUrl);
      });
      // 欢迎词已就绪，如果 AudioContext 已被解锁（首次交互已发生），立即播放
      if (audioCtx && audioCtx.state === 'running' && state.welcomeAudioUrls.length > 0 && !state.welcomePlayed) {
        playWelcomeQueue();
      }
    }
  } catch (e) {
    addSystemMessage('⚠️ 初始化失败: ' + e.message);
  }

  inputText.focus();
}

// ── 欢迎词自动播放（由首次交互触发） ─────────
function playWelcomeQueue() {
  if (state.welcomePlayed || state.welcomeAudioUrls.length === 0) return;
  state.welcomePlayed = true;
  resetAudioQueue();
  state.welcomeAudioUrls.forEach(url => { audioQueue.push({ url, btn: null }); });
  audioQueueTotal = state.welcomeAudioUrls.length;
  setStatus(`${state.characterName} 朗读中... [1/${audioQueueTotal}]`);
  playNextAudio();
}

// 在页面加载时立即创建 AudioContext（suspended 状态）
// 并监听首次用户交互来解锁
audioCtx = new (window.AudioContext || window.webkitAudioContext)();

async function onFirstInteraction() {
  document.removeEventListener('click', onFirstInteraction, true);
  document.removeEventListener('touchstart', onFirstInteraction, true);
  document.removeEventListener('keydown', onFirstInteraction, true);

  if (audioCtx.state === 'suspended') {
    try { await audioCtx.resume(); } catch (e) {}
  }
  // 播放 50ms 静音占位确认解锁
  try {
    const sr = audioCtx.sampleRate;
    const dummy = audioCtx.createBuffer(1, Math.ceil(sr * 0.05), sr);
    const ds = audioCtx.createBufferSource();
    ds.buffer = dummy; ds.connect(audioCtx.destination); ds.start(0);
  } catch(e) {}

  // 播欢迎词
  if (state.welcomeAudioUrls.length > 0) {
    playWelcomeQueue();
  }
}
// 用捕获阶段确保第一时间拿到事件
document.addEventListener('click', onFirstInteraction, true);
document.addEventListener('touchstart', onFirstInteraction, true);
document.addEventListener('keydown', onFirstInteraction, true);

// ── 发送 ───────────────────────────────────
async function sendMessage() {
  const text = inputText.value.trim();
  if (!text || state.isProcessing) return;
  await unlockAudio();
  inputText.value = '';
  chatStream(text);
}

// ── 事件绑定 ───────────────────────────────
inputText.addEventListener('input', () => {
  sendBtn.disabled = !inputText.value.trim() || state.isProcessing || isListening;
});

inputText.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

micBtn.addEventListener('click', () => {
  if (state.isProcessing) return;
  toggleMic();
});

// ── 启动 ───────────────────────────────────
initApp();
</script>
