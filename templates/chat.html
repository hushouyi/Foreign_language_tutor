<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alice - AI 语言助教</title>
<link rel="stylesheet" href="/static/css/chat.css">
</head>
<body>

<!-- 侧边栏 -->
<div id="main-container">
<div id="sidebar-panel">
  <div id="sidebar-header">
    <button id="sidebar-toggle">☰</button>
    <span class="header-title">⚙ 设置</span>
    <button class="header-close">✕</button>
  </div>
  <div id="sidebar-body">
    <div class="sidebar-item">
      <div class="item-icon ic-llm">L</div>
      <div class="item-content">
        <div class="section-label">LLM 引擎</div>
        <select id="cfg-llm"></select>
      </div>
    </div>
    <div class="sidebar-item">
      <div class="item-icon ic-tts">T</div>
      <div class="item-content">
        <div class="section-label">TTS 引擎</div>
        <select id="cfg-tts">
          <option value="edge-tts">Edge-TTS</option>
        </select>
      </div>
    </div>
    <div class="sidebar-item">
      <div class="item-icon ic-asr">K</div>
      <div class="item-content">
        <div class="section-label">ASR 引擎</div>
        <select id="cfg-asr">
          <option value="keyboard">语音输入 (原生)</option>
        </select>
      </div>
    </div>
    <div class="sidebar-item">
      <div class="item-icon ic-search">S</div>
      <div class="item-content">
        <div class="section-label">联网搜索</div>
        <select id="cfg-search"></select>
      </div>
    </div>
    <div class="sidebar-item">
      <div class="item-icon ic-status">●</div>
      <div class="item-content">
        <div class="section-label">📊 服务状态</div>
        <div id="service-list"></div>
      </div>
    </div>

    <!-- 系统设置（可折叠） -->
    <div class="sidebar-item settings-toggle" id="settings-toggle">
      <div class="item-icon ic-settings">⚙</div>
      <div class="item-content">
        <div class="section-label">⚙ 系统设置</div>
        <span class="settings-arrow">▶</span>
      </div>
    </div>
    <div class="settings-body" id="settings-body">
      <div class="settings-item">
        <span class="settings-item-label">语音超时</span>
        <select id="cfg-silence"></select>
      </div>
    </div>
  </div>
</div>

<div id="app">
  <div id="header">Alice - AI 语言助教 [English]</div>

  <div id="messages"></div>

  <div id="status-bar" class="hidden"></div>

  <div id="input-area">
    <div id="input-row">
      <button id="mic-btn" class="mic mic-idle" title="切换到语音模式">⌨️</button>
      <input type="text" id="input-text" placeholder="输入消息..." autofocus>
      <button id="send-btn" disabled>发送</button>
    </div>
  </div>
</div>  <!-- /app -->
</div>  <!-- /main-container -->

<div id="warning-toast"></div>

<script type="module" src="/static/js/app.js"></script>
</body>
</html>
